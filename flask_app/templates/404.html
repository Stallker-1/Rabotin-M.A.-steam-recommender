{% extends "base.html" %}

{% block title %}404 - Страница не найдена{% endblock %}

{% block content %}
<div class="text-center py-5">
    <i class="fas fa-search fa-5x text-muted mb-4"></i>
    <h1 class="display-1">404</h1>
    <h3 class="mb-4">Страница не найдена</h3>
    <p class="text-muted mb-4">Извините, запрошенная страница не существует</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">
        <i class="fas fa-home me-2"></i>Вернуться на главную
    </a>
</div>
{% endblock %}
